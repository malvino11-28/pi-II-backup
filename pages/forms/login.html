<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar</title>
    <link rel="shortcut icon" href="/imgs/logo.png" type="image/x-icon" />
    <link rel="stylesheet" href="/style/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div id="header"></div>
    <script src="/pages/main/header.js"></script>
    <!-- Div para criar espaço entre o header e o conteudo da pagina-->
    <div class="mt-5 mb-5">
      <span
        class="input-group-text bg-white border-0 rounded-start-pill ps-4 pe-2 py-2"
      >
        <i class="bi bi-envelope-fill fs-3 text-dark"></i>
      </span>
    </div>
    <div class="container d-flex m-5 mx-auto justify-content-center">
      <div class="w-100" style="max-width: 550px">
        <h2 class="text-center fw-bold mb-5 text-dark mt-5">
          BEM-VINDO DE VOLTA!
        </h2>

        <div
          class="input-group mb-4 rounded-pill border border-dark overflow-hidden"
        >
          <span class="input-group-text bg-transparent border-0 ps-4 pe-2 py-3">
            <i class="bi bi-lock-fill fs-3"></i>
          </span>
          <input
            type="text"
            class="form-control border-0 shadow-none fs-5 py-3"
            placeholder="E-mail ou nome de usuário"
          />
        </div>

        <div
          class="input-group mb-5 rounded-pill border border-dark overflow-hidden"
        >
          <span class="input-group-text bg-transparent border-0 ps-4 pe-2 py-3">
            <i class="bi bi-lock-fill fs-3"></i>
          </span>
          <input
            type="password"
            class="form-control border-0 shadow-none fs-5 py-3"
            placeholder="Senha"
          />
        </div>
        <div class="text-center lh-sm mb-5">
          <p class="fs-5 fw-bold mb-1 text-dark">
            Caso não tenha conta,
            <a class="text-danger" href="/pages/forms/cadastro.html"
              >cadastre-se aqui.</a
            >
          </p>
        </div>
        <div class="text-center lh-sm mb-5">
          <p class="fs-5 fw-bold mb-1 text-danger">Esqueceu sua senha?</p>
          <p class="fs-5 text-dark fw-medium mb-0">
            Clique
            <a href="#" class="text-dark fw-bold text-decoration-none">aqui.</a>
          </p>
        </div>

        <div class="d-flex justify-content-center">
          <a href="" class="text-decoration-none">
            <button
              class="btn fw-bold text-white rounded-pill px-5 py-3 fs-5 mb-5"
              style="background-color: #900505"
            >
              ENTRAR
            </button>
          </a>
        </div>
      </div>
    </div>
    <div id="footer" class="mt-5"></div>
    <script src="/pages/main/footer.js"></script>
  </body>
</html>
