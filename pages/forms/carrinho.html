<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meu Carrinho</title>
  <link rel="shortcut icon" href="/imgs/logo.png" type="image/x-icon" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"/>
  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/style/style.css" />
</head>
<body class="d-flex flex-column min-vh-100">
  <div id="header"></div>
  <script src="/pages/main/header.js"></script>
    <div class="conteudo pagina-carrinho flex-grow-1">
      <div class="container mt-5">
        <div class="card shadow-lg rounded-4 cart-card">
          <div class="row g-0">
            <div class="col-md-8 p-4 cart">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h4>Carrinho de Compras</h4>
                <span class="text-muted">3 itens</span>
              </div>
              <div class="row align-items-center border-bottom py-3 cart-item">
                <div class="col-2">
                  <img class="img-fluid rounded cart-img" src="/imgs/picanha.png">
                </div>
                <div class="col">
                  <div class="text-muted small">Bovinos</div>
                  <div class="fw-semibold">Picanha 300g</div>
                </div>
                <div class="col-md-3 text-center">
                  <input type="number" class="form-control text-center mx-auto" value="1" min="1" style="width: 80px;">
                </div>
                <div class="col-md-3 d-flex justify-content-end align-items-center gap-3">
                  <span class="fw-semibold">R$ 65,99</span>
                  <button class="btn text-danger p-0">
                    <i class="bi bi-trash fs-5"></i>
                  </button>
                </div>
              </div>
              <div class="row align-items-center border-bottom py-3 cart-item">
                <div class="col-2">
                  <img class="img-fluid rounded cart-img" src="/imgs/frango.png">
                </div>
                <div class="col">
                  <div class="text-muted small">Aves</div>
                  <div class="fw-semibold">Peito de Frango 1Kg</div>
                </div>
                <div class="col-md-3 text-center">
                  <input type="number"
                        class="form-control text-center mx-auto"
                        value="1"
                        min="1"
                        style="width: 80px;">
                </div>
                <div class="col-md-3 d-flex justify-content-end align-items-center gap-3">
                  <span class="fw-semibold">R$ 24.99</span>
                  <button class="btn text-danger p-0">
                    <i class="bi bi-trash fs-5"></i>
                  </button>
                </div>
              </div>
              <div class="row align-items-center border-bottom py-3 cart-item">
                <div class="col-2">
                  <img class="img-fluid rounded cart-img" src="/imgs/maminha.png">
                </div>
                <div class="col">
                  <div class="text-muted small">Bovinos</div>
                  <div class="fw-semibold">Maminha 400g</div>
                </div>
                <div class="col-md-3 text-center">
                  <input type="number"
                        class="form-control text-center mx-auto"
                        value="1"
                        min="1"
                        style="width: 80px;">
                </div>
                <div class="col-md-3 d-flex justify-content-end align-items-center gap-3">
                  <span class="fw-semibold">R$ 49,99</span>
                  <button class="btn text-danger p-0">
                    <i class="bi bi-trash fs-5"></i>
                  </button>
                </div>
              </div>
              <div class="mt-4">
                <a href="/pages/main/produtos.html" class="btn btn-finalizar">Continuar Comprando</a>
              </div>
            </div>
            <div class="col-md-4 p-4 rounded-end-4 summary">
              <h5>Resumo do Pedido</h5>
              <hr>
              <div class="d-flex justify-content-between total">
                <span>3 Itens</span>
                <span>R$ 147,97</span>
              </div>
              <form class="mt-4">
                <p class="mb-1 total">TIPO DE ENTREGA</p>
                <select class="form-select mb-3">
                  <option>Entrega Padrão - R$ 10,00</option>
                </select>
                <p class="mb-1 total">CEP</p>
                <input class="form-control" placeholder="Digite seu CEP" type="text" maxlength="9">
              </form>
              <div class="d-flex justify-content-between border-top pt-3 mt-3 total">
                <strong>PREÇO TOTAL</strong>
                <strong>R$ 147,97</strong>
              </div>
              <a href="/pages/forms/pagamento.html" class="btn btn-summary w-100 mt-4">
                Ir para Pagamento
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  <div id="footer"></div>
    <script src="/pages/main/footer.js"></script>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
