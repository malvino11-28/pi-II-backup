    <title>Gerenciamento de Clientes</title>

    <link rel="stylesheet" href="../Style/style.css">
</head>
<body>
    <nav id="sidebar">
        <div class="sidebar-header">

    <div id="content">

            </div>
            <div class="user-area">
                <span><i class="fa-regular fa-circle-user"></i> Administrador 1 | Sair</span>

        <div class="main-wrapper">
            <div class="search-bar">
                <input type="text" placeholder="Pesquisar colaboradores...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div class="content-flex">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:30px"></th>
                                <th>Nome</th>
                                <th>Telefone</th>
                                <th>Cpf</th>
                                <th>E-mail</th>
                                <th>Editar</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><input type="checkbox"></td>
                                <td>Juan Gabriel</td>
                                <td>(11) 99999-9999</td>
                                <td>000.000.000-00</td>
                                <td>juan@gmail.com</td>
                                <td class="col-edit"><i class="fa-regular fa-trash-can"></i> ●●● <i class="fa-solid fa-pen"></i></td>
                            </tr>
                            <tr>
                                <td><input type="checkbox"></td>
                                <td>Emanoel Bernardo</td>
                                <td>(11) 88888-8888</td>
                                <td>111.111.111-11</td>
                                <td>emanoel@empresa.com</td>
                                <td class="col-edit"><i class="fa-regular fa-trash-can"></i> ●●● <i class="fa-solid fa-pen"></i></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="form-card">
                    <img src="Capturar-removebg-preview.png" alt="Logo">
                    <h3>Cadastro de novos colaboradores</h3>
                    <input type="text" placeholder="Nome completo...">
                    <input type="text" placeholder="Celular...">
                    <input type="date" placeholder="">
                    <input type="text" placeholder="Cpf...">
                    <input type="text" placeholder="E-mail...">
                    <button class="btn-submit">Cadastrar</button>
                </div>
            </div>
        </div>
    </div>

</html>
