<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciamento de Produtos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../Style/style.css">

</head>
<body>
    <nav id="sidebar">
        <div class="sidebar-header">
            <h4>MENU</h4>
        </div>
        
        <a href="../Gerenciamento clientes/index.html" class="nav-link">
            <i class="fa-solid fa-users"></i> Clientes
        </a>
        <a href="../Gerenciamento produtos/index.html" class="nav-link active">
            <i class="fa-solid fa-box"></i> Produtos
        </a>
        <a href="../Relatorios/index.html" class="nav-link">
            <i class="fa-solid fa-chart-line"></i> Relatórios
        </a>
    </nav>

    <div id="content">
        <header>
            <div class="logo-area">
                <i class="fa-solid fa-bars" style="cursor:pointer"></i>
                <h2 style="margin:0; font-weight:500;">Gerenciamento de Produtos</h2>
            </div>
            <div class="user-area">
                <span><i class="fa-regular fa-circle-user"></i> Administrador 1 | Sair</span>
            </div>
        </header>

        <div class="main-wrapper">
            <div class="search-bar">
                <input type="text" placeholder="Pesquisar produtos...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-action"><i class="fa-solid fa-plus"></i> Adicionar</button>
                <button class="btn-action"><i class="fa-solid fa-trash-can"></i> Excluir</button>
            </div>

            <div class="products-grid">
                <script>
                    for(let i=0; i<10; i++) {
                        document.write(`
                        <div class="products-grid">
                            <div class="product-card">
                                    <input type="checkbox" style="position:absolute; top:10px; left:10px">
                                <div class="product-image-placeholder">
                                    <i><img src="../Imgs produtos/1.png" width="185px" height="155px" style="border-radius: 15px;" alt=""></i>
                                </div>
                                <p class="product-name">Picanha Bovina Friboi Tradicional Vácuo 1,1kg</p>
                            </div>
                        </div>
                        `);
                    }
                </script>
            </div>
        </div>
    </div>
</body>
</html>
