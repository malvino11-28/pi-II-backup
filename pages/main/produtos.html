<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos - Corte Imperial</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style/style.css" />
    <style>
      .product-grid .card {
        height: 420px;
        display: flex;
        flex-direction: column;
      }
      .product-info {
        margin-top: auto;
        padding-top: 12px;
      }
      .price-line {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 12px;
      }
      .btn-qty-group {
        display: flex;
        justify-content: center;
        gap: 4px;
        margin-bottom: 12px;
      }
      .btn-qty {
        width: 36px;
        height: 36px;
        padding: 0;
        font-size: 16px;
        font-weight: bold;
        border-radius: 4px;
      }
      .qty-show {
        width: 44px;
        height: 36px;
        border: 1px solid #ddd;
        background: #f8f9fa;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
      }
      .btn-buy {
        height: 44px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 6px;
      }
      .form-check-input {
        display: none;
      }
      .form-check-input:checked + label {
        background-color: #a30000;
        color: white;
        border-color: black;
      }
    </style>
  </head>
  <body>
    <div id="header"></div>
    <script src="/pages/main/header.js"></script>

    <div class="container py-4">
      <!-- FILTROS + CONTROLE -->
      <div class="row align-items-center mb-4 mt-3">
        <div class="col-md-6">
          <div class="d-flex align-items-center gap-3">
            <h5 class="mb-0">128 produtos</h5>
            <select class="form-select form-select-sm" style="width: 140px">
              <option>Relevância</option>
            </select>
          </div>
        </div>
        <div class="col-md-6 text-end d-flex justify-content-end">
          <div class="card shadow-sm p-2" style="max-width: 280px">
            <small class="text-muted mb-1 d-block me-3">Categoria</small>
            <div class="d-flex gap-2 flex-wrap">
              <div class="form-check form-check-inline p-0">
                <input class="form-check-input" type="checkbox" id="cat1" />
                <label
                  class="btn btn-sm btn-outline-secondary py-1 px-2"
                  for="cat1"
                  >Vermelha</label
                >
              </div>
              <div class="form-check form-check-inline p-0">
                <input class="form-check-input" type="checkbox" id="cat2" />
                <label
                  class="btn btn-sm btn-outline-secondary py-1 px-2"
                  for="cat2"
                  >Branca</label
                >
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-4 product-grid">
        <!-- PRODUTO 1 -->
        <div class="col-xl-3 col-lg-4 col-md-6">
          <div class="card border-0 shadow-sm h-100">
            <img
              src="https://via.placeholder.com/320x220/ff4444/fff?text=PICANHA"
              class="card-img-top"
              style="height: 220px; object-fit: cover"
            />
            <div class="card-body p-3 product-info">
              <h6 class="fw-bold mb-2">Picanha Premium</h6>
              <div class="price-line">
                <small class="text-muted text-decoration-line-through"
                  >R$99,99</small
                >
                <span class="h5 text-danger fw-bold mb-0">R$65,99</span>
              </div>
              <small class="text-muted d-block mb-3">300g • Congelado</small>

              <div class="btn-qty-group">
                <button class="btn btn-outline-secondary btn-qty">-</button>
                <div class="qty-show">0</div>
                <button class="btn btn-outline-secondary btn-qty">+</button>
              </div>

              <button class="btn btn-warning w-100 btn-buy">🛒 Comprar</button>
            </div>
          </div>
        </div>

        <!-- PRODUTO 2 -->
        <div class="col-xl-3 col-lg-4 col-md-6">
          <div class="card border-0 shadow-sm h-100">
            <img
              src="https://via.placeholder.com/320x220/ff8844/fff?text=MAMINHA"
              class="card-img-top"
              style="height: 220px; object-fit: cover"
            />
            <div class="card-body p-3 product-info">
              <h6 class="fw-bold mb-2">Maminha Bovina</h6>
              <div class="price-line">
                <small class="text-muted text-decoration-line-through"
                  >R$79,99</small
                >
                <span class="h5 text-danger fw-bold mb-0">R$49,99</span>
              </div>
              <small class="text-muted d-block mb-3">400g • Resfriado</small>

              <div class="btn-qty-group">
                <button class="btn btn-outline-secondary btn-qty">-</button>
                <div class="qty-show">0</div>
                <button class="btn btn-outline-secondary btn-qty">+</button>
              </div>

              <button class="btn btn-warning w-100 btn-buy">🛒 Comprar</button>
            </div>
          </div>
        </div>

        <!-- PRODUTO 3 -->
        <div class="col-xl-3 col-lg-4 col-md-6">
          <div class="card border-0 shadow-sm h-100">
            <img
              src="https://via.placeholder.com/320x220/44aaff/fff?text=FRANGO"
              class="card-img-top"
              style="height: 220px; object-fit: cover"
            />
            <div class="card-body p-3 product-info">
              <h6 class="fw-bold mb-2">Peito Frango Seara</h6>
              <div class="price-line">
                <span class="h5 text-primary fw-bold mb-0">R$24,99</span>
              </div>
              <small class="text-muted d-block mb-3">1kg • Congelado</small>

              <div class="btn-qty-group">
                <button class="btn btn-outline-secondary btn-qty">-</button>
                <div class="qty-show">0</div>
                <button class="btn btn-outline-secondary btn-qty">+</button>
              </div>

              <button class="btn btn-warning w-100 btn-buy">🛒 Comprar</button>
            </div>
          </div>
        </div>

        <!-- PRODUTO 4 -->
        <div class="col-xl-3 col-lg-4 col-md-6">
          <div class="card border-0 shadow-sm h-100">
            <img
              src="https://via.placeholder.com/320x220/44ff44/fff?text=KIT"
              class="card-img-top"
              style="height: 220px; object-fit: cover"
            />
            <div class="card-body p-3 product-info">
              <h6 class="fw-bold mb-2">Kit Churrasco</h6>
              <div class="price-line">
                <small class="text-muted text-decoration-line-through"
                  >R$129,99</small
                >
                <span class="h5 text-danger fw-bold mb-0">R$89,99</span>
              </div>
              <small class="text-muted d-block mb-3">3 peças • Completo</small>

              <div class="btn-qty-group">
                <button class="btn btn-outline-secondary btn-qty">-</button>
                <div class="qty-show">0</div>
                <button class="btn btn-outline-secondary btn-qty">+</button>
              </div>

              <button class="btn btn-warning w-100 btn-buy">🛒 Comprar</button>
            </div>
          </div>
        </div>
      </div>

      <!-- PAGINAÇÃO -->
      <nav class="mt-5 text-center">
        <ul class="pagination justify-content-center">
          <li class="page-item"><a class="page-link" href="#">Anterior</a></li>
          <li class="page-item active"><a class="page-link" href="#">1</a></li>
          <li class="page-item"><a class="page-link" href="#">2</a></li>
          <li class="page-item"><a class="page-link" href="#">Próximo</a></li>
        </ul>
      </nav>
    </div>
    <!-- SEU FOOTER -->

    <style>
      .product-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
      }
      .d-none.d-lg-block {
        position: relative;
      }
    </style>

    <div id="footer"></div>
    <script src="/pages/main/footer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
