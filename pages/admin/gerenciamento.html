<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/imgs/logo.png" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/style/gerenciamento.css" />
    <title>Gerenciamento de Clientes</title>
  </head>
  <body>
    <div class="collapse" id="navbarToggleExternalContent" data-bs-theme="dark">
      <div class="bg-dark p-4">
        <h5 class="text-body-emphasis h4">Collapsed content</h5>
        <span class="text-body-secondary"
          >Toggleable via the navbar brand.</span
        >
      </div>
    </div>
    <nav style="background-color: black" class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <img src="/imgs/logo.png" width="5%" />
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse_navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav">
            <div class="macumba">
              <h1 style="color: white">Gerenciamento de Clientes</h1>
            </div>
            <a class="nav-link" aria-current="page" href="#">Início</a>
            <a class="nav-link" href="#">Administrador </a>
            <a class="nav-link" href="#">Sair</a>
          </div>
        </div>
      </div>
    </nav>
    <div class="container-fluid mt-4">
      <div class="row">
        <div class="col-lg-4 form-area">
          <div class="mb-4">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control custom-input" />
          </div>
          <div class="mb-4">
            <label class="form-label">Data de nascimento</label>
            <input type="date" class="form-control custom-input" />
          </div>
          <div class="mb-4">
            <label class="form-label">Telefone</label>
            <input type="text" class="form-control custom-input" value="+55" />
          </div>
          <div class="mb-4">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control custom-input" />
          </div>
          <div class="mb-4">
            <label class="form-label">Endereço</label>
            <input type="text" class="form-control custom-input" />
          </div>
        </div>
        <div class="col-lg-8">
          <div class="search-box">
            <div class="input-group search-input">
              <span class="input-group-text">
                <i class="bi bi-search"></i>
              </span>
              <input type="text" class="form-control" placeholder="Procurar" />
            </div>
          </div>
          <div class="table-box">
            <table class="table mb-0 align-middle">
              <thead>
                <tr>
                  <th>Nome <i class="bi bi-arrow-down-up"></i></th>
                  <th>E-mail <i class="bi bi-arrow-down-up"></i></th>
                  <th>Telefone <i class="bi bi-arrow-down-up"></i></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><i class="bi bi-person-circle user-icon"></i></td>
                  <td></td>
                  <td></td>
                </tr>
                <tr>
                  <td><i class="bi bi-person-circle user-icon"></i></td>
                  <td></td>
                  <td></td>
                </tr>
                <tr>
                  <td><i class="bi bi-person-circle user-icon"></i></td>
                  <td></td>
                  <td></td>
                </tr>
                <tr>
                  <td><i class="bi bi-person-circle user-icon"></i></td>
                  <td></td>
                  <td></td>
                </tr>
                <tr>
                  <td><i class="bi bi-person-circle user-icon"></i></td>
                  <td></td>
                  <td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="buttons-area">
        <button class="btn btn-delete">EXCLUIR</button>
        <button class="btn btn-edit">EDITAR</button>
        <button class="btn btn-save">SALVAR</button>
      </div>
    </div>
  </body>
</html>
