<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Clientes - Corte Imperial Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/pi-II-backup/style/admin.css">
</head>
<body>

    <header class="admin-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <div class="d-flex align-items-center">
                        <a href="/pi-II-backup/pages/admin/inicio.html"><img src="/pi-II-backup/imgs/logo.png" alt="Corte Imperial" class="admin-logo me-3"></a>
                        <div>
                            <h1 class="admin-brand">Corte Imperial</h1>
                            <p class="admin-subtitle">Painel Administrativo</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 text-end">
                    <span class="user-info">
                        <i class="bi bi-person-circle"></i> Administrador
                    </span>
                    <button class="btn-logout">
                        <i class="bi bi-box-arrow-right"></i> Sair
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="page-title-section">
        <div class="container">
            <h2 class="page-title">Gerenciamento de Clientes</h2>
            <p class="page-breadcrumb">
                <a href="/pi-II-backup/pages/admin/inicio.html"<i class="bi bi-house-door"></i> Início </a>
                <i class="bi bi-chevron-right"></i> Clientes
            </p>
        </div>
    </div>

    <div class="container">
        
        <div class="stats-container">
            <div class="row">
                <div class="col-lg-4 col-md-4 col-12 mb-3">
                    <div class="stat-card">
                        <i class="bi bi-people-fill stat-icon"></i>
                        <p class="stat-number" id="totalClientes">0</p>
                        <p class="stat-label">Total de Clientes</p>
                    </div>
                </div>
                <div class="col-lg-4 col-md-4 col-12 mb-3">
                    <div class="stat-card" style="border-left-color: #27ae60;">
                        <i class="bi bi-person-check-fill stat-icon" style="color: #27ae60;"></i>
                        <p class="stat-number" id="clientesAtivos">0</p>
                        <p class="stat-label">Clientes Ativos</p>
                    </div>
                </div>
                <div class="col-lg-4 col-md-4 col-12 mb-3">
                    <div class="stat-card" style="border-left-color: #e74c3c;">
                        <i class="bi bi-person-x-fill stat-icon" style="color: #e74c3c;"></i>
                        <p class="stat-number" id="clientesInativos">0</p>
                        <p class="stat-label">Clientes Inativos</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="alertContainer"></div>

        <div class="form-card">
            <div class="card-header-custom">
                <h3><i class="bi bi-person-plus-fill"></i> Cadastrar Novo Cliente</h3>
            </div>

            <form id="formCliente">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="nome" class="form-label">
                            <i class="bi bi-person"></i> Nome Completo *
                        </label>
                        <input type="text" class="form-control" id="nome" placeholder="Digite o nome completo" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope"></i> E-mail *
                        </label>
                        <input type="email" class="form-control" id="email" placeholder="exemplo@email.com" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="telefone" class="form-label">
                            <i class="bi bi-telephone"></i> Telefone *
                        </label>
                        <input type="text" class="form-control" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="cpf" class="form-label">
                            <i class="bi bi-card-text"></i> CPF *
                        </label>
                        <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="cep" class="form-label">
                            <i class="bi bi-mailbox"></i> CEP *
                        </label>
                        <input type="text" class="form-control" id="cep" placeholder="00000-000" maxlength="9" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label for="status" class="form-label">
                            <i class="bi bi-toggle-on"></i> Status *
                        </label>
                        <select class="form-control" id="status" required>
                            <option value="">Selecione...</option>
                            <option value="Ativo">Ativo</option>
                            <option value="Inativo">Inativo</option>
                        </select>
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-12 text-end">
                        <button type="button" class="btn-clear" id="btnLimpar">
                            <i class="bi bi-x-circle"></i> Limpar
                        </button>
                        <button type="button" class="btn-save" id="btnSalvar">
                            <i class="bi bi-check-circle"></i> Salvar Cliente
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="table-card">
            <div class="table-header">
                <h3 class="table-title">
                    <i class="bi bi-table"></i> Lista de Clientes
                </h3>
                <button class="btn-delete-selected" id="btnExcluirSelecionados">
                    <i class="bi bi-trash"></i> Excluir Selecionados
                </button>
            </div>

            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="ckTodos"></th>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Telefone</th>
                            <th>CPF</th>
                            <th>CEP</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaClientes">

                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div style="height: 50px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/pi-II-backup/function.js"></script>
</body>
</html>
